<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deep Mapping Dresden</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Config (API keys, tokens) -->
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css"/>

  <!-- Main scripts -->
  <script src="js/functions.js" defer></script>
  <script src="js/main.js" defer></script>
</head>
<body>

<header class="site-header">
  <div class="header-title">Deep Mapping Dresden</div>
  <nav class="header-nav">
    <a href="about.html"><b data-i18n="about">Info</b></a>
  </nav>
</header>

<div id="content-wrapper">
  <div id="map"></div>

  <aside id="sidebar" class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-content">
        <div style="margin-top:6px;text-align:center;"><span data-i18n="year">Jahr</span>: <span id="yearLabel">1560</span></div>
        <input type="range" id="yearSlider" step="1" style="width:95%;">
        <div id="timelineTicks" style="position: relative; height:25px; margin-top:6px;"></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-content">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
          <div style="width:15px; height:15px; border-radius:50%; background:#084808; opacity:0.7; border:1px solid #084808; margin-left:1rem;"></div>
          <span style="font-size:13px; margin-left:0.5rem;" data-i18n-html="certainLocation">historischer und moderner Name stimmen überein</span>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="width:15px; height:15px; border-radius:50%; background:#FFA500; opacity:0.7; border:1px solid #FFA500; margin-left:1rem;"></div>
          <span style="font-size:13px; margin-left:0.5rem;" data-i18n-html="uncertainLocation">historischer Name kann nicht eindeutig zugeordnet werden</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-header" data-i18n="dresdenMentions">Dresden-Erwähnungen</div>
      <div id="dresdenContent" class="sidebar-content"></div>
    </div>

  </aside>
</div>

<footer class="site-footer">
  <div class="footer-content">
    <div>
      <span data-i18n-html="footerProject"><strong>Deep Mapping Dresden</strong> - Reiseberichte 1604-1900</span>
    </div>
    <div data-i18n-html="footerGithub">
      Projekt auf <a href="https://github.com/LuisePohlmann/Deep-Mapping-Dresden/">Github</a> ansehen
    </div>
    <div>
      © Luise Pohlmann, 2026
    </div>
    <button class="language-toggle" type="button" data-i18n-toggle>English</button>
  </div>
</footer>

</body>
</html>
